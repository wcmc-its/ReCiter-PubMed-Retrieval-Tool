version: 0.2
# https://docs.aws.amazon.com/codebuild/latest/userguide/getting-started.html
phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo Nothing to do in the install phase...
  pre_build:
    commands:
      - echo Nothing to do in the pre_build phase...
  build:
    commands:
      - echo Build started on `date`
      # Run the curated unit tests while excluding the live load tests
      # (ReCiterPubmedApiLoadTest / LoadTest), which 403 without a running service.
      - mvn clean install -Dtest=PubmedEFetchHandlerTest,PubMedUriParserCallableTest,PubMedArticleRetrievalServiceTest -DfailIfNoTests=false
  post_build:
    commands:
      - echo Build completed on `date`
      - cp target/reciter-pubmed-retrieval-tool-1.1.0.jar .
artifacts:
  files:
    - reciter-pubmed-retrieval-tool-1.1.0.jar
    - .ebextensions/**/* 
    - Procfile